<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600" style="background:#f0f4f8; font-family: 'Segoe UI', Arial, sans-serif;">

  <defs>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#166534"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b21a8"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9a3412"/>
    </marker>
    <marker id="arr-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#155e75"/>
    </marker>
    <marker id="arr-indigo" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#312e81"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#713f12"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#f0f4f8"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#64748b" font-size="10" letter-spacing="5">MULTI-AGENT ARCHITECTURE</text>
  <text x="450" y="54" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Star Wars Agent System</text>

  <!-- Bus background rings -->
  <ellipse cx="440" cy="310" rx="100" ry="36" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="5 5" opacity="0.3"/>
  <ellipse cx="440" cy="310" rx="120" ry="50" fill="none" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="2 10" opacity="0.2"/>

  <!-- ══════════ EDGES ══════════ -->

  <!-- Star Wars API → Agent A (MCP) vertical -->
  <line x1="200" y1="158" x2="200" y2="198" stroke="#155e75" stroke-width="2" marker-end="url(#arr-cyan)"/>
  <rect x="208" y="165" width="44" height="14" rx="3" fill="#e0f2fe"/>
  <text x="230" y="176" text-anchor="middle" fill="#155e75" font-size="9" font-weight="600">MCP call</text>

  <!-- Agent A → Bus -->
  <line x1="253" y1="272" x2="340" y2="295" stroke="#166534" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="265" y="272" width="66" height="14" rx="3" fill="#dcfce7"/>
  <text x="298" y="283" text-anchor="middle" fill="#166534" font-size="9" font-weight="600">publish list</text>



  <!-- Agent B → LLM (prompt) — offset right -->
  <line x1="668" y1="200" x2="668" y2="158" stroke="#312e81" stroke-width="2" marker-end="url(#arr-indigo)"/>
  <rect x="674" y="170" width="42" height="14" rx="3" fill="#e0e7ff"/>
  <text x="695" y="181" text-anchor="middle" fill="#312e81" font-size="9" font-weight="600">prompt</text>

  <!-- LLM → Agent B (response) — offset left -->
  <line x1="648" y1="158" x2="648" y2="200" stroke="#312e81" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arr-indigo)"/>
  <rect x="596" y="170" width="46" height="14" rx="3" fill="#e0e7ff"/>
  <text x="619" y="181" text-anchor="middle" fill="#312e81" font-size="9" font-weight="600">code</text>



  <!-- Bus → Agent C — PURPLE to reflect Agent C listens for Agent B's code -->
  <line x1="510" y1="338" x2="615" y2="392" stroke="#6b21a8" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arr-purple)"/>
  <rect x="554" y="356" width="62" height="14" rx="3" fill="#f3e8ff" stroke="#6b21a8" stroke-width="0.5"/>
  <text x="585" y="367" text-anchor="middle" fill="#6b21a8" font-size="9" font-weight="600">subscribe</text>

  <!-- Bus → UI -->
  <line x1="340" y1="324" x2="258" y2="390" stroke="#713f12" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arr-yellow)"/>
  <rect x="272" y="348" width="76" height="14" rx="3" fill="#fef9c3"/>
  <text x="310" y="359" text-anchor="middle" fill="#713f12" font-size="9" font-weight="600">all messages</text>

  <!-- ══════════ NODES ══════════ -->

  <!-- Star Wars API — top left (rx=58 gives plenty of room) -->
  <circle cx="200" cy="100" r="56" fill="#cffafe" stroke="#155e75" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="200" y="89" text-anchor="middle" fill="#164e63" font-size="11" font-weight="700">Star Wars</text>
  <text x="200" y="103" text-anchor="middle" fill="#164e63" font-size="11" font-weight="700">API</text>
  <text x="200" y="117" text-anchor="middle" fill="#155e75" font-size="8.5">Has MCP server</text>

  <!-- Agent A — mid left -->
  <circle cx="200" cy="260" r="56" fill="#dcfce7" stroke="#166534" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="200" y="246" text-anchor="middle" fill="#14532d" font-size="12" font-weight="700">Agent A</text>
  <text x="200" y="260" text-anchor="middle" fill="#166534" font-size="8.5">Fetches characters</text>
  <text x="200" y="272" text-anchor="middle" fill="#166534" font-size="8.5">via MCP</text>
  <text x="200" y="284" text-anchor="middle" fill="#166534" font-size="8.5">Broadcasts list</text>

  <!-- LLM — top right -->
  <circle cx="660" cy="100" r="56" fill="#e0e7ff" stroke="#312e81" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="660" y="92" text-anchor="middle" fill="#1e1b4b" font-size="12" font-weight="700">LLM</text>
  <text x="660" y="107" text-anchor="middle" fill="#312e81" font-size="8.5">Generates answers</text>
  <text x="660" y="119" text-anchor="middle" fill="#312e81" font-size="8.5">from prompts + data</text>

  <!-- Agent B — mid right -->
  <circle cx="660" cy="260" r="56" fill="#f3e8ff" stroke="#6b21a8" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="660" y="243" text-anchor="middle" fill="#3b0764" font-size="12" font-weight="700">Agent B</text>
  <text x="660" y="257" text-anchor="middle" fill="#6b21a8" font-size="8.5">Reads bus messages</text>
  <text x="660" y="269" text-anchor="middle" fill="#6b21a8" font-size="8.5">Uses LLM to generate</text>
  <text x="660" y="281" text-anchor="middle" fill="#6b21a8" font-size="8.5">code if suspicious</text>

  <!-- Message Bus — centre (widened slightly on right to give purple arrows room) -->
  <rect x="340" y="282" width="200" height="58" rx="12" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="440" y="303" text-anchor="middle" fill="#1e3a8a" font-size="13" font-weight="700">Message Bus</text>
  <text x="440" y="318" text-anchor="middle" fill="#1d4ed8" font-size="9">Pub / Sub · Shared Topology</text>
  <text x="440" y="331" text-anchor="middle" fill="#1d4ed8" font-size="9">All agents receive all messages</text>

  <!-- Agent B → Bus (publish code) — TOP arrow: from upper-left of Agent B down to bus top-right edge -->
  <line x1="618" y1="299" x2="542" y2="287" stroke="#6b21a8" stroke-width="2.5" marker-end="url(#arr-purple)"/>
  <rect x="544" y="280" width="72" height="15" rx="3" fill="#f3e8ff" stroke="#6b21a8" stroke-width="0.5"/>
  <text x="580" y="291" text-anchor="middle" fill="#6b21a8" font-size="9" font-weight="700">publish code</text>

  <!-- Bus → Agent B (subscribe) — GREEN to reflect Agent B subscribing to Agent A messages -->
  <line x1="542" y1="334" x2="618" y2="321" stroke="#166534" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arr-green)"/>
  <rect x="544" y="330" width="62" height="15" rx="3" fill="#dcfce7" stroke="#166534" stroke-width="0.5"/>
  <text x="575" y="341" text-anchor="middle" fill="#166534" font-size="9" font-weight="700">subscribe</text>

  <!-- Agent C — bottom right -->
  <circle cx="660" cy="440" r="56" fill="#ffedd5" stroke="#9a3412" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="660" y="426" text-anchor="middle" fill="#431407" font-size="12" font-weight="700">Agent C</text>
  <text x="660" y="440" text-anchor="middle" fill="#9a3412" font-size="8.5">Subscribes to bus</text>
  <text x="660" y="452" text-anchor="middle" fill="#9a3412" font-size="8.5">Executes received</text>
  <text x="660" y="464" text-anchor="middle" fill="#9a3412" font-size="8.5">code only</text>

  <!-- UI — bottom left -->
  <circle cx="200" cy="440" r="56" fill="#fef9c3" stroke="#a16207" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="200" y="426" text-anchor="middle" fill="#713f12" font-size="12" font-weight="700">UI</text>
  <text x="200" y="440" text-anchor="middle" fill="#a16207" font-size="8.5">Listens to all</text>
  <text x="200" y="452" text-anchor="middle" fill="#a16207" font-size="8.5">bus messages</text>
  <text x="200" y="464" text-anchor="middle" fill="#a16207" font-size="8.5">Read-only</text>

  <!-- ══════════ LEGEND ══════════ -->
  <rect x="50" y="518" width="800" height="66" rx="8" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="534" text-anchor="middle" fill="#94a3b8" font-size="8.5" letter-spacing="4">LEGEND</text>

  <line x1="72" y1="550" x2="96" y2="550" stroke="#475569" stroke-width="2"/>
  <text x="102" y="554" fill="#475569" font-size="9">Publish (solid)</text>

  <line x1="200" y1="550" x2="224" y2="550" stroke="#475569" stroke-width="1.8" stroke-dasharray="5 4"/>
  <text x="230" y="554" fill="#475569" font-size="9">Subscribe (dashed)</text>

  <line x1="356" y1="550" x2="380" y2="550" stroke="#155e75" stroke-width="2"/>
  <text x="386" y="554" fill="#475569" font-size="9">MCP Protocol</text>

  <line x1="490" y1="550" x2="514" y2="550" stroke="#312e81" stroke-width="1.8" stroke-dasharray="5 4"/>
  <text x="520" y="554" fill="#475569" font-size="9">LLM Interaction</text>

  <!-- colour swatches row 2 -->
  <circle cx="78" cy="572" r="5" fill="#cffafe" stroke="#155e75" stroke-width="1.5"/>
  <text x="88" y="576" fill="#475569" font-size="9">Star Wars API</text>

  <circle cx="184" cy="572" r="5" fill="#dcfce7" stroke="#166534" stroke-width="1.5"/>
  <text x="194" y="576" fill="#475569" font-size="9">Agent A</text>

  <circle cx="264" cy="572" r="5" fill="#e0e7ff" stroke="#312e81" stroke-width="1.5"/>
  <text x="274" y="576" fill="#475569" font-size="9">LLM</text>

  <circle cx="328" cy="572" r="5" fill="#f3e8ff" stroke="#6b21a8" stroke-width="1.5"/>
  <text x="338" y="576" fill="#475569" font-size="9">Agent B</text>

  <circle cx="414" cy="572" r="5" fill="#ffedd5" stroke="#9a3412" stroke-width="1.5"/>
  <text x="424" y="576" fill="#475569" font-size="9">Agent C</text>

  <circle cx="494" cy="572" r="5" fill="#fef9c3" stroke="#a16207" stroke-width="1.5"/>
  <text x="504" y="576" fill="#475569" font-size="9">UI (observe only)</text>

  <rect x="614" y="567" width="18" height="10" rx="3" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="638" y="576" fill="#475569" font-size="9">Message Bus</text>

</svg>
